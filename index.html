<style>
body {

}

.container {

  border-radius: 20px;

  transition: 0.2s;
}

button:hover {
  background: #ff8fc3;
  transform: scale(1.05);
}
</style>
</head>

<body>

<div class="container" id="game">
  <h1>Do You Know Yourself? 💖</h1>
  <p>🌸 ลองตอบตามความรู้สึกจริงของคุณนะ</p>
  <button onclick="startGame()">เริ่มเกม</button>
</div>

<script>
let current = 0;

let traits = {
  planner:0, thinker:0, leader:0, creative:0, social:0,
  calm:0, brave:0, emotional:0, discipline:0, freedom:0
};

const baseQuestions = [
  {q:"ถ้ามีเวลาว่างทั้งวัน คุณจะทำอะไรเป็นอย่างแรก?", a:[
    {text:"วางแผนสิ่งที่อยากทำ", type:"planner"},
    {text:"คิดเรื่องอนาคต", type:"thinker"},
    {text:"ออกไปเจอเพื่อน", type:"social"}
  ]},
  {q:"ถ้าเจอปัญหาใหญ่ คุณจะทำยังไง?", a:[
    {text:"คิดวิเคราะห์ก่อน", type:"thinker"},
    {text:"ลุยเลย", type:"brave"},
    {text:"ค่อย ๆ แก้", type:"calm"}
  ]},
  {q:"เวลามีโอกาสใหม่ ๆ คุณมักจะ?", a:[
    {text:"ลองทันที", type:"brave"},
    {text:"คิดก่อน", type:"thinker"},
    {text:"ดูสถานการณ์", type:"planner"}
  ]}
];

// ทำให้ครบ 33 ข้อ
let questions = [];
while(questions.length < 33){
  questions = questions.concat(baseQuestions);
}

function startGame(){
  showQuestion();
}

function showQuestion(){
  let q = questions[current];

  let html = `
    <h1>Do You Know Yourself? 💖</h1>
    <p>ข้อที่ ${current+1} / 33</p>
    <p>${q.q}</p>
  `;

  q.a.forEach(ans=>{
    html += `<button onclick="answer('${ans.type}')">${ans.text}</button>`;
  });

  document.getElementById("game").innerHTML = html;
}

  traits[type]++;
  current++;

  document.getElementById("game").innerHTML = "<p>💭 กำลังวิเคราะห์...</p>";
