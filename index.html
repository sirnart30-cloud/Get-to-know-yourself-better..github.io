<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Do You Even Know Yourself?</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;500;700&display=swap" rel="stylesheet">
<style>
body {
  margin: 0;
  font-family: 'Kanit', sans-serif;
  background: #ffd6e7;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}
.container {
  text-align: center;
  background: #fff0f6;
  padding: 30px;
  border-radius: 25px;
  width: 90%;
  max-width: 600px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}
h1 {
  font-size: 28px;
}
.question {
  font-size: 20px;
  margin: 20px 0;
  line-height: 1.5;
  text-align: left;
}
button {
  display: block;
  width: 100%;
  padding: 15px;
  margin: 10px 0;
  border: none;
  border-radius: 15px;
  font-size: 18px;
  cursor: pointer;
  background: #ff9ec9;
}
button:hover {
  background: #ff7ab8;
}
.result {
  font-size: 20px;
  line-height: 1.5;
  text-align: left;
}
</style>
</head>
<body>

<div class="container" id="app">
  <h1>💖 Do You Even Know Yourself?</h1>
  <button onclick="startGame()">เริ่มเกม</button>
</div>

<script>
let current = 0;
let traits = {
  planner:0, thinker:0, leader:0, creative:0, social:0,
  calm:0, brave:0, emotional:0, discipline:0, freedom:0, reflective:0
};

let questions = [
  {q:"เมื่อคุณตื่นเช้ามา คุณรู้สึกขอบคุณหรือคิดถึงสิ่งใดเป็นอย่างแรกในชีวิต?", trait:"calm"},
  {q:"คุณคิดว่าความสุขของคุณขึ้นอยู่กับตัวเองมากน้อยแค่ไหน?", trait:"thinker"},
  {q:"เวลาเจอความล้มเหลว คุณมักตอบสนองด้วยการยอมรับ เรียนรู้ หรือปฏิเสธ?", trait:"brave"},
  {q:"ในความสัมพันธ์ที่ใกล้ชิดที่สุด คุณมักเป็นฝ่ายให้หรือฝ่ายรับมากกว่า?", trait:"social"},
  {q:"คุณเคยตั้งคำถามกับตัวเองเกี่ยวกับความหมายของชีวิตไหม? และคิดว่าคำตอบนั้นเปลี่ยนคุณอย่างไร?", trait:"thinker"},
  {q:"เมื่อถูกวิพากษ์วิจารณ์ คุณมักรู้สึกอย่างไรและจัดการกับความรู้สึกนั้นอย่างไร?", trait:"emotional"},
  {q:"คุณให้ความสำคัญกับแผนชีวิตระยะยาวมากแค่ไหน?", trait:"planner"},
  {q:"คุณมักตัดสินใจตามเหตุผลหรือความรู้สึกในสถานการณ์สำคัญ?", trait:"thinker"},
  {q:"คุณคิดว่าตัวเองเป็นคนที่กล้าเสี่ยงหรือกลัวความไม่แน่นอน?", trait:"brave"},
  {q:"เวลาที่คุณรู้สึกเครียด คุณมักทำอะไรเพื่อลดความกังวล?", trait:"calm"},
  {q:"คุณเคยรู้สึกว่าใครสักคนไม่เข้าใจคุณจริง ๆ ไหม? และคุณจัดการกับความรู้สึกนั้นอย่างไร?", trait:"emotional"},
  {q:"คุณมักให้ความสำคัญกับอิสระในการตัดสินใจมากแค่ไหน?", trait:"freedom"},
  {q:"คุณเคยรู้สึกว่าตัวเองทำในสิ่งที่สังคมคาดหวัง มากกว่าที่คุณอยากทำจริง ๆ ไหม?", trait:"discipline"},
  {q:"คุณเคยรู้สึกว่าตัวเองต้อง “สวมหน้ากาก” เพื่อให้เข้ากับคนอื่นไหม?", trait:"social"},
  {q:"เวลาที่คุณมีความคิดสร้างสรรค์ คุณมักสร้างสรรค์สิ่งใหม่ ๆ เพื่อใครหรือเพื่ออะไร?", trait:"creative"},
  {q:"คุณคิดว่าตัวเองเป็นผู้นำหรือผู้ตามในสถานการณ์ที่ต้องตัดสินใจร่วมกัน?", trait:"leader"},
  {q:"คุณเคยต้องเสียสละสิ่งสำคัญเพื่อตัวเองหรือคนอื่นไหม? และความรู้สึกนั้นเป็นอย่างไร?", trait:"brave"},
  {q:"คุณคิดว่าการให้อภัยเป็นเรื่องง่ายหรือยากสำหรับคุณ?", trait:"calm"},
  {q:"คุณเคยรู้สึกว่าอารมณ์ตัวเองส่งผลต่อการตัดสินใจมากเกินไปไหม?", trait:"emotional"},
  {q:"คุณคิดว่าการวางแผนชีวิตทำให้คุณมีความมั่นคงหรือจำกัดตัวเอง?", trait:"planner"},
  {q:"คุณเคยรู้สึกอิจฉาหรือเปรียบเทียบตัวเองกับคนอื่นมากที่สุดเมื่อไหร่?", trait:"emotional"},
  {q:"คุณมักเรียนรู้จากความผิดพลาดตัวเองหรือจากความผิดพลาดของผู้อื่นมากกว่า?", trait:"thinker"},
  {q:"เวลาที่คุณอยู่คนเดียว คุณมักคิดถึงเรื่องอดีต ปัจจุบัน หรืออนาคต?", trait:"thinker"},
  {q:"คุณเคยทำอะไรโดยไม่กลัวผลลัพธ์ แม้ว่าคนอื่นจะไม่เข้าใจไหม?", trait:"brave"},
  {q:"คุณเคยรู้สึกว่าความคิดสร้างสรรค์ของคุณไม่ถูกเห็นคุณค่าไหม?", trait:"creative"},
  {q:"คุณให้ความสำคัญกับความสัมพันธ์กับครอบครัว เพื่อน หรือคนรักมากที่สุด?", trait:"social"},
  {q:"คุณเคยตั้งคำถามกับคุณค่าของตัวเองหรือความสามารถของตัวเองบ่อยแค่ไหน?", trait:"emotional"},
  {q:"คุณคิดว่าตัวเองมีวินัยมากแค่ไหนเมื่อทำตามเป้าหมายส่วนตัว?", trait:"discipline"},
  {q:"คุณเคยทำอะไรที่ขัดใจตัวเองเพราะต้องรักษาภาพลักษณ์หรือสังคมไหม?", trait:"discipline"},
  {q:"คุณมักปล่อยให้ชีวิตเป็นไปตามโชคชะตาหรือควบคุมชีวิตด้วยตัวเอง?", trait:"freedom"},
  {q:"คุณคิดว่าความคิดสร้างสรรค์และความมีเหตุผลสามารถอยู่ร่วมกันในตัวคุณได้ไหม?", trait:"thinker"},
  {q:"คุณเคยคิดว่าการช่วยเหลือคนอื่นทำให้คุณรู้สึกเติมเต็มมากกว่าการช่วยตัวเองไหม?", trait:"social"},
  {q:"ถ้าคุณต้องอธิบายตัวเองในสามคำ คุณจะเลือกคำไหนและเพราะอะไร?", trait:"reflective"}
];

function startGame() {
  current = 0;
  for (let key in traits) traits[key]=0;
  showQuestion();
}

function showQuestion() {
  if (current >= questions.length) {
    showResult();
    return;
  }
  
  const container = document.getElementById("app");
  const q = questions[current];
  
  container.innerHTML = `
    <div class="question">${current+1}. ${q.q}</div>
    <button onclick="chooseOption('${q.trait}')">ตอบใช่/เห็นด้วย</button>
    <button onclick="chooseOption('')">ตอบไม่/ไม่เห็นด้วย</button>
  `;
}

function chooseOption(trait) {
  if (trait) traits[trait] += 1;
  current += 1;
  showQuestion();
}

function showResult() {
  const container = document.getElementById("app");
  let maxTrait = Object.keys(traits).reduce((a, b) => traits[a] > traits[b] ? a : b);

  let descriptions = {
    planner: "คุณเป็นคนวางแผนทุกอย่างในชีวิตตั้งแต่เช้าจนค่ำ 📅 ทั้งอาหาร การเดินทาง งานอดิเรก บางทีก็วางแผนฝันตอนนอนด้วย 😴 แต่ถึงแม้จะวางแผนละเอียดสุด ๆ บางครั้งก็ลืมว่า… โทรศัพท์ต้องชาร์จไฟก่อนออกจากบ้านนะ!",
    thinker: "คุณชอบคิดวิเคราะห์ทุกเรื่อง 🤯 จากเรื่องใหญ่ของชีวิตไปจนถึง ‘ทำไมขนมปังถึงกลายเป็นแซนด์วิช?’ คุณมักจะทบทวนตัวเองและสถานการณ์อย่างลึกซึ้งจนบางที… คิดไปคิดมาจนลืมกินข้าว แต่ก็ทำให้คนอื่นชอบมาปรึกษาเพราะคุณให้คำตอบที่เจาะลึกแบบสุด ๆ",
    leader: "คุณเกิดมาเป็นผู้นำ 💪 มั่นใจ ตัดสินใจเด็ดขาด แต่บางทีคนรอบข้างก็ต้องเตือนคุณว่า ‘เฮ้! อย่าสั่งทุกคนเดินตามคุณไปหมด!’ คุณสามารถชี้ทางได้ดี แต่บางครั้งก็สนุกเกินไปจนเพื่อนหัวเราะตอนทำตามคำสั่ง",
    creative: "คุณเป็นคนที่มีไอเดียสุดล้ำ 🎨 มองโลกเป็นผืนผ้าใบ ไม่มีอะไรเกินจินตนาการ แต่บางทีไอเดียสุดครีเอทีฟของคุณก็… เช่น เอาแปรงทาสีมาทำเป็นหมวก 😅 โลกคุณคือโลกของความบ้าแต่ชาญฉลาดในเวลาเดียวกัน",
    social: "คุณเข้ากับคนง่าย 🕺 รู้จักชวนเพื่อนคุยทุกเรื่อง แต่ถ้าเจอเพื่อนหายไปคุณก็สามารถเริ่มคุยกับต้นไม้หรือแมวได้ 🐱 คุณคือคนที่ทำให้สังคมอบอุ่น… แต่บางครั้งก็อบอุ่นเกินจนคนรอบข้างขำไม่หยุด",
    calm: "คุณใจเย็นมาก ❄️ สามารถควบคุมอารมณ์และคิดก่อนทำ แต่ถ้าใครแอบเอาของกินคุณไป… ระวังไฟลุกในใจคุณ 🔥 การมีสติของคุณทำให้คนอื่นอิจฉา แต่คุณก็ยังเก่งในการหัวเราะกับสถานการณ์แย่ ๆ ได้",
    brave: "คุณกล้าเผชิญทุกสถานการณ์ 🏄‍♂️ ความกล้าของคุณทำให้คนอื่นทึ่ง แต่บางครั้งก็กล้าจนเสี่ยงแบบ… ข้ามถนนไม่ดูไฟแดง 😎 คุณคือคนที่ไม่กลัวล้ม แต่บางทีหัวใจอาจเต้นแรงเกินไป",
    emotional: "คุณเข้าใจความรู้สึกตัวเองและคนอื่นสุด ๆ 😢 แต่บางทีคุณก็ซึมซับอารมณ์จนร้องไห้ตอนดูโฆษณาแมว คุณมีความลึกทางอารมณ์ ทำให้เป็นเพื่อนที่ดีและรักใคร่ใครง่าย แต่ก็ต้องระวังน้ำตาไหลในที่ไม่เหมาะสม",
    discipline: "คุณมีวินัยสุด ๆ 💪 ทำงานตามเป้าหมายอย่างต่อเนื่อง แต่ถ้าพิซซ่าเข้ามาใกล้… วินัยอาจหายไปใน 3 วินาที 🍕 คุณสามารถจัดการชีวิตได้ดี แต่ก็ต้องมีพื้นที่ให้ตัวเองบ้างไม่งั้นเหนื่อยเกินไป",
    freedom: "คุณรักอิสระ 🌈 ชอบตัดสินใจเองและทำตามใจ แต่บางทีคุณก็ลืมงาน ลืมเวลา หรือแม้แต่ลืมวันเกิดตัวเอง 😅 โลกนี้คือสนามเด็กเล่นของคุณ และคุณก็เล่นมันแบบเต็มที่",
    reflective: "คุณชอบทบทวนตัวเอง 🤔 คิดลึก เข้าใจตัวเองและผู้อื่น แต่บางครั้งคิดมากจน… ลืมกินข้าว หรือคุยกับใครไม่ทัน 😅 คุณเป็นนักสะท้อนที่เก่ง แต่ต้องระวังอย่าคิดมากเกินไปจนเครียด"
  };

  container.innerHTML = `
    <h1>ผลลัพธ์ของคุณ 💖</h1>
    <div class="result"><strong>บุคลิกภาพเด่น:</strong> ${maxTrait}</div>
    <div class="result">${descriptions[maxTrait]}</div>
    <button onclick="startGame()">เล่นใหม่</button>
  `;
}
</script>

</body>
</html>
