<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Do You Even Know Yourself?</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;500;700&display=swap" rel="stylesheet">
<style>
body {
  margin: 0;
  font-family: 'Kanit', sans-serif;
  background: #ffd6e7;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  background-image: radial-gradient(circle at top left, #ffd6e7 0%, #ffe0f0 100%);
}

.container {
  text-align: center;
  background: #fff0f6;
  padding: 40px;
  border-radius: 30px;
  width: 95%;
  max-width: 700px;
  box-shadow: 0 15px 40px rgba(0,0,0,0.2);
  background-image: repeating-linear-gradient(
    45deg,
    rgba(255,255,255,0.1),
    rgba(255,255,255,0.1) 10px,
    rgba(255,240,246,0.1) 10px,
    rgba(255,240,246,0.1) 20px
  );
}

h1 {
  font-size: 32px;
  margin-bottom: 30px;
}

.question {
  font-size: 22px;
  margin: 25px 0;
  line-height: 1.8;
  text-align: left;
  padding: 20px;
  border-radius: 20px;
  background: #ffe6f0;
  box-shadow: 0 8px 20px rgba(0,0,0,0.1);
}

button {
  display: block;
  width: 100%;
  padding: 18px;
  margin: 12px 0;
  border: none;
  border-radius: 20px;
  font-size: 20px;
  cursor: pointer;
  background: #ff9ec9;
  transition: all 0.3s ease;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

button:hover {
  background: #ff7ab8;
  transform: translateY(-2px);
}

.result {
  font-size: 22px;
  line-height: 1.8;
  text-align: left;
  padding: 20px;
  border-radius: 20px;
  background: #ffe6f0;
  box-shadow: 0 8px 20px rgba(0,0,0,0.1);
  margin-bottom: 15px;
}
</style>
</head>
<body>

<div class="container" id="app">
  <h1>💖 Do You Even Know Yourself?</h1>
  <button onclick="startGame()">เริ่มเกม</button>
</div>

<script>
let current = 0;
let traits = {
  planner:0, thinker:0, leader:0, creative:0, social:0,
  calm:0, brave:0, emotional:0, discipline:0, freedom:0, reflective:0
};

let questions = [
  {
    q: "เมื่อคุณตื่นเช้ามา คุณรู้สึกขอบคุณหรือคิดถึงสิ่งใดเป็นอย่างแรกในชีวิต?",
    options: [
      {text:"กาแฟ ☕ ต้องมาก่อนทุกอย่าง", trait:"calm"},
      {text:"แผนวันนี้ต้องทำให้เสร็จ 📅", trait:"planner"},
      {text:"คิดถึงคนที่รัก 💖", trait:"social"},
      {text:"โลกนี้สนุกมาก 🌈 จะทำอะไรดีนะ", trait:"creative"}
    ]
  },
  {
    q: "คุณคิดว่าความสุขของคุณขึ้นอยู่กับตัวเองมากน้อยแค่ไหน?",
    options: [
      {text:"ขึ้นอยู่กับตัวเองล้วน ๆ 💪", trait:"freedom"},
      {text:"ต้องคิดวิเคราะห์ให้เข้าใจ 😎", trait:"thinker"},
      {text:"อยู่กับเพื่อนจะมีความสุข 🕺", trait:"social"},
      {text:"ขึ้นอยู่กับสถานการณ์ 🎢", trait:"calm"}
    ]
  },
  {
    q: "เวลาเจอความล้มเหลว คุณมักตอบสนองอย่างไร?",
    options: [
      {text:"ยอมรับ เรียนรู้ และลองใหม่ 💡", trait:"brave"},
      {text:"วิเคราะห์ว่าผิดพลาดตรงไหน 🤯", trait:"thinker"},
      {text:"ปรึกษาเพื่อนเพื่อหาทางออก 🗣️", trait:"social"},
      {text:"พักก่อน แล้วค่อยคิดต่อ 🧘‍♂️", trait:"calm"}
    ]
  },
  {
    q: "คุณคิดว่าตัวเองเป็นผู้นำหรือผู้ตามในสถานการณ์ที่ต้องตัดสินใจร่วมกัน?",
    options: [
      {text:"ผู้นำชัดเจน 💪", trait:"leader"},
      {text:"ชอบวิเคราะห์ก่อนตัดสินใจ 🤔", trait:"thinker"},
      {text:"ตามเพื่อนแต่มีไอเดียลับ 🎨", trait:"creative"},
      {text:"ยืดหยุ่นแล้วตามคนอื่นได้ 🧘‍♀️", trait:"calm"}
    ]
  },
  {
    q: "เวลาที่คุณมีความคิดสร้างสรรค์ คุณมักสร้างสรรค์สิ่งใหม่ ๆ เพื่อใครหรืออะไร?",
    options: [
      {text:"เพื่อคนอื่น ❤️", trait:"social"},
      {text:"เพื่อความสนุกตัวเอง 😎", trait:"creative"},
      {text:"เพื่อแก้ปัญหา 🤯", trait:"thinker"},
      {text:"เพื่อทำตามแผนชีวิต 📅", trait:"planner"}
    ]
  }
];

function startGame() {
  current = 0;
  for (let key in traits) traits[key]=0;
  showQuestion();
}

function showQuestion() {
  if (current >= questions.length) {
    showResult();
    return;
  }

  const container = document.getElementById("app");
  const q = questions[current];

  let optionsHtml = '';
  const letters = ['A','B','C','D'];
  q.options.forEach((opt, idx) => {
    optionsHtml += `<button onclick="chooseOption('${opt.trait}')">${letters[idx]}. ${opt.text}</button>`;
  });

  container.innerHTML = `
    <div class="question">${current+1}. ${q.q}</div>
    ${optionsHtml}
  `;
}

function chooseOption(trait) {
  if (trait) traits[trait] += 1;
  current += 1;
  showQuestion();
}

function showResult() {
  const container = document.getElementById("app");
  let maxTrait = Object.keys(traits).reduce((a, b) => traits[a] > traits[b] ? a : b);

  let descriptions = {
    planner: "คุณเป็นคนวางแผนทุกอย่างในชีวิตตั้งแต่เช้าจนค่ำ 📅 ...",
    thinker: "คุณชอบคิดวิเคราะห์ทุกเรื่อง 🤯 ...",
    leader: "คุณเกิดมาเป็นผู้นำ 💪 ...",
    creative: "คุณเป็นคนที่มีไอเดียสุดล้ำ 🎨 ...",
    social: "คุณเข้ากับคนง่าย 🕺 ...",
    calm: "คุณใจเย็นมาก ❄️ ...",
    brave: "คุณกล้าเผชิญทุกสถานการณ์ 🏄‍♂️ ...",
    emotional: "คุณเข้าใจความรู้สึกตัวเองและคนอื่นสุด ๆ 😢 ...",
    discipline: "คุณมีวินัยสุด ๆ 💪 ...",
    freedom: "คุณรักอิสระ 🌈 ...",
    reflective: "คุณชอบทบทวนตัวเอง 🤔 ..."
  };

  container.innerHTML = `
    <h1>ผลลัพธ์ของคุณ 💖</h1>
    <div class="result"><strong>บุคลิกภาพเด่น:</strong> ${maxTrait}</div>
    <div class="result">${descriptions[maxTrait]}</div>
    <button onclick="startGame()">เล่นใหม่</button>
  `;
}
</script>

</body>
</html>
